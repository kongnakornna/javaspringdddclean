server:
  port: 1080
  servlet:
    context-path: /api
  ssl:
    enabled: false

spring:
  main:
    allow-circular-references: true
  application:
    name: app
  datasource:
    url: jdbc:postgresql://localhost:5432/icmonapp?useSSL=false
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  neo4j:
    uri: neo4j://localhost:7999
    authentication:
      username: neo4j
      password: password

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  data:
    mongodb:
      host: localhost
      port: 27017
      database: app_logs
      username: mongoadmin
      password: secret
      authentication-database: admin

jwt:
  publicKey: ${JWT_PUBLIC_KEY}
  privateKey: ${JWT_PRIVATE_KEY}