server:
  port: 1080
  ssl:
    enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  show-actuator: false
  paths-to-match: /api/v1/**, /api/v1/batch-jobs/**, /api/v1/languages/**, /api/v1/translations/**, /api/v1/iot/**

spring:
  main:
    allow-circular-references: true
  application:
    name: app
  datasource:
    url: jdbc:postgresql://localhost:5432/icmonapp
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: HikariPool-1
      connection-test-query: SELECT 1
      auto-commit: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_schema: public
        format_sql: true
    show-sql: true

  neo4j:
    uri: neo4j://localhost:7999
    authentication:
      username: neo4j
      password: password

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  data:
    mongodb:
      host: localhost
      port: 27017
      database: app_logs
      username: mongoadmin
      password: secret
      authentication-database: admin
logging:
  enabled: true        # เปิด/ปิด logging ทั้งหมด
  log-requests: true   # บันทึก HTTP request log
  log-method-calls: true  # บันทึก method call log
  log-errors: true     # บันทึก error log
  level:
    root: DEBUG
    com.icmon: DEBUG
    com.log: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.zaxxer.hikari: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/app.log
    max-size: 10MB
    max-history: 30

jwt:
  publicKey: ${JWT_PUBLIC_KEY:default-public-key-for-dev-only}
  privateKey: ${JWT_PRIVATE_KEY:default-private-key-for-dev-only}

