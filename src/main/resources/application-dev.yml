server:
  port: 1080
  servlet:
    context-path: /api
  ssl:
    enabled: false

spring:
  application:
    name: app-dev
  datasource:
    url: jdbc:postgresql://localhost:5432/icmonapp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: HikariPool-1
      connection-test-query: SELECT 1
      auto-commit: true
      transaction-isolation: TRANSACTION_READ_COMMITTED

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyComponentPathImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        default_schema: public
        format_sql: true
    show-sql: true

  neo4j:
    uri: neo4j://localhost:7999
    authentication:
      username: neo4j
      password: password

  redis:
    host: localhost
    port: 6379
    password:
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  data:
    mongodb:
      host: localhost
      port: 27017
      database: app_logs
      username: mongoadmin
      password: secret
      authentication-database: admin

jwt:
  publicKey: ${JWT_PUBLIC_KEY}
  privateKey: ${JWT_PRIVATE_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    path: /v3/api-docs
  show-actuator: false

app:
  logging:
    enabled: true
    log-requests: true
    log-method-calls: true
    log-errors: true